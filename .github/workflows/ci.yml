name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: gcc-14,   cc: gcc-14,   cxx: g++-14   }
          - { name: clang-18, cc: clang-18, cxx: clang++-18 }
        build_type: [Debug, Release]
    name: build-and-test (${{ matrix.compiler.name }}, ${{ matrix.build_type }})
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
      BUILD_TYPE: ${{ matrix.build_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.compiler.cc }} ${{ matrix.compiler.cxx }}

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: cmake-build-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}/_deps
          key: ${{ runner.os }}-${{ matrix.compiler.name }}-${{ matrix.build_type }}-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Test
        run: make test

      - name: Smoke-run benchmark
        run: make bench 1_hello_world BENCH_ARGS="--benchmark_min_time=0.01s"
